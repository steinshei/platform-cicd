name: reusable-build-multiarch-image

on:
  workflow_call:
    inputs:
      context_dir:
        description: Docker build context directory
        required: true
        type: string
      dockerfile:
        description: Dockerfile path
        required: true
        type: string
      image_repo:
        description: Image repository path without registry (owner/name)
        required: true
        type: string
      tag:
        description: Image tag
        required: true
        type: string
      platforms:
        description: Comma-separated target platforms
        required: false
        type: string
        default: linux/amd64,linux/arm64

permissions:
  contents: read
  packages: write

jobs:
  build-multiarch-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context_dir }}
          file: ${{ inputs.dockerfile }}
          push: true
          platforms: ${{ inputs.platforms }}
          tags: ghcr.io/${{ inputs.image_repo }}:${{ inputs.tag }}
