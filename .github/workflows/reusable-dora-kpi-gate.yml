name: reusable-dora-kpi-gate

on:
  workflow_call:
    inputs:
      window_days:
        description: Time window in days
        required: false
        type: string
        default: "7"
      max_cfr:
        description: Max Change Failure Rate percent
        required: false
        type: string
        default: "15"
      max_mttr_hours:
        description: Max MTTR in hours
        required: false
        type: string
        default: "0.5"
      artifact_name:
        description: Artifact name prefix
        required: false
        type: string
        default: dora-kpi-gate

permissions:
  actions: read
  contents: read

jobs:
  kpi-gate:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      WINDOW_DAYS: ${{ inputs.window_days }}
      MAX_CFR: ${{ inputs.max_cfr }}
      MAX_MTTR_HOURS: ${{ inputs.max_mttr_hours }}
      ARTIFACT_NAME: ${{ inputs.artifact_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download DORA event artifacts
        run: |
          chmod +x ./scripts/download_dora_artifacts.sh
          ./scripts/download_dora_artifacts.sh "${WINDOW_DAYS}" "dora/weekly-input"

      - name: Generate weekly report json
        run: |
          python3 ./scripts/generate_dora_weekly_report.py \
            --events-dir dora/weekly-input \
            --days "${WINDOW_DAYS}" \
            --out-json dora/reports/weekly-report.json \
            --out-md dora/reports/weekly-report.md

      - name: Evaluate KPI gate
        run: |
          python3 ./scripts/check_dora_targets.py \
            --report-json dora/reports/weekly-report.json \
            --max-cfr "${MAX_CFR}" \
            --max-mttr-hours "${MAX_MTTR_HOURS}" \
            --out-md dora/reports/kpi-check.md

      - name: Upload KPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}-${{ github.run_id }}
          path: |
            dora/reports/weekly-report.json
            dora/reports/weekly-report.md
            dora/reports/kpi-check.md

      - name: Append summary
        run: cat dora/reports/kpi-check.md >> "$GITHUB_STEP_SUMMARY"
