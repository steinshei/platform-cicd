name: reusable-deploy-dev

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      values_file:
        required: true
        type: string
      image_tag:
        required: true
        type: string
      skip_if_deploy_commit:
        required: false
        type: boolean
        default: true
    secrets:
      ci_bot_token:
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dev-gitops:
    if: ${{ !inputs.skip_if_deploy_commit || !startsWith(github.event.head_commit.message, 'deploy(dev):') }}
    runs-on: ubuntu-latest
    env:
      PR_BOT_TOKEN: ${{ secrets.ci_bot_token || secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update dev image tag
        run: |
          set -euo pipefail
          sed -i.bak -E "s|^  tag: .*|  tag: ${{ inputs.image_tag }}|" "${{ inputs.values_file }}"
          rm -f "${{ inputs.values_file }}.bak"

      - name: Create GitOps PR for dev update
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ env.PR_BOT_TOKEN }}
          commit-message: "deploy(dev): ${{ inputs.service_name }} ${{ inputs.image_tag }}"
          branch: "bot/gitops-dev-${{ inputs.service_name }}-${{ github.run_id }}"
          delete-branch: true
          title: "deploy(dev): ${{ inputs.service_name }} ${{ inputs.image_tag }}"
          body: |
            Automated dev GitOps update.
            - service: ${{ inputs.service_name }}
            - image_tag: `${{ inputs.image_tag }}`
            - source_run: `${{ github.run_id }}`
          add-paths: |
            ${{ inputs.values_file }}

      - name: Enable auto-merge for dev GitOps PR
        if: steps.cpr.outputs.pull-request-number != ''
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ env.PR_BOT_TOKEN }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash
